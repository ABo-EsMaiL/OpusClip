services:
  opusclip:
    build: .
    image: opusclip:latest
    runtime: nvidia
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - OPUSCLIP_API_KEY=${OPUSCLIP_API_KEY:?API key required}
      - LLM_BASE_URL=${LLM_BASE_URL:-}
      - LLM_MODEL=${LLM_MODEL:-gpt-3.5-turbo}
      - WHISPER_DEVICE=${WHISPER_DEVICE:-cuda}
    volumes:
      - ./output:/app/output
      - ./input:/app/input
      - ~/.cache/whisper:/root/.cache/whisper
    command: ["/app/input/video.mp4", "--output", "/app/output"]
